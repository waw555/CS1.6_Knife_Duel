; Knife Duel configuration

; Сколько ударов ножом по стене нужно сделать для вызова на дуэль
kd_knifecount 1

; Время (в секундах) на завершение дуэли, иначе оба игрока погибают
kd_preparetime 30

; Денежная награда победителю дуэли
kd_reward 1000

; Притягивание дуэлянтов друг к другу, если они слишком далеко
; 0 - выключено, 1 - включено
kd_protection 1

; Максимальная дистанция между дуэлянтами при включенной защите
kd_maxdistance 99999

; Сообщать живым игрокам о возможности дуэли
; 0 - выключено, 1 - включено
kd_announce 1

; Сбрасывать здоровье дуэлянтов до значения kd_duelhp при старте дуэли
; 0 - выключено, 1 - включено
kd_resethp 1

; Уровень здоровья для дуэлянтов при включенном kd_resethp
kd_duelhp 200
